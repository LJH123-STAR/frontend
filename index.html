<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 移动端适配样式（新增） -->
    <style>
      /* 基础重置，使页面在手机上自动缩放 */
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      /* 图片、视频等元素自动适应屏幕宽度 */
      img, video, iframe, svg {
        max-width: 100%;
        height: auto;
        display: block;
      }
      /* 防止容器溢出，强制宽度100%且隐藏横向溢出 */
      .container, .page, .view, [class*="wrapper"], [class*="layout"] {
        width: 100%;
        overflow-x: hidden;
      }
      /* 表格或代码块等宽内容处理 */
      table, pre, code {
        max-width: 100%;
        overflow-x: auto;
        display: block;
      }
    </style>
    <title>AI双语法理编曲系统</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
